<html>
    <head>
        <title>JavaScript Button</title>
        <script>
            function myFunction() {
                alert("Button Clicked!");
            }
        </script>
    </head>
    <body>
        <tr>
            <td>Click the button below:</td>
        </tr>
        <button onclick="myFunction()">Click me</button>
    </body>
</html>
